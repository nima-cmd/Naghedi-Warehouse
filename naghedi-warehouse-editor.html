<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Naghedi Warehouse Layout Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
  :root{--bg:#0e1116;--panel:#161b22;--panel-2:#1c2230;--border:#2a323d;--text:#d7dde5;--muted:#7d8794;--faint:#4a5360;
    --accent:#ffb020;--sel:#5aa9ff;--verified:#2dd4a7;--alert:#ff5d5d;--zone:#c46b3e;
    --sans:'Space Grotesk',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;-webkit-user-select:none;user-select:none}
  #scene{position:fixed;inset:0;touch-action:none}canvas{display:block}
  #topbar{position:fixed;top:0;left:0;right:0;min-height:54px;display:flex;align-items:center;gap:8px;padding:8px 12px;flex-wrap:wrap;
    background:linear-gradient(180deg,rgba(14,17,22,.97),rgba(14,17,22,.82));border-bottom:1px solid var(--border);backdrop-filter:blur(8px);z-index:10}
  .brand{font-weight:700;font-size:13px;white-space:nowrap}.brand span{color:var(--accent)}
  .modes{display:flex;gap:3px;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:3px}
  .modes button{border:0;background:transparent;color:var(--muted);font-weight:600;font-size:12px;padding:6px 10px;border-radius:6px;cursor:pointer}
  .modes button.on{background:var(--accent);color:#1a1206}
  .search{flex:1;min-width:90px;max-width:260px;position:relative}
  .search input{width:100%;height:34px;border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:8px;padding:0 12px 0 30px;font-family:var(--mono);font-size:13px;outline:none}
  .search input:focus{border-color:var(--accent)}.search::before{content:'⌕';position:absolute;left:10px;top:6px;color:var(--muted);font-size:15px}
  .tbtn{height:34px;padding:0 11px;border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:8px;font-weight:600;font-size:12px;cursor:pointer;white-space:nowrap}
  .tbtn:hover{border-color:var(--muted)}
  .stat-strip{display:flex;gap:12px;font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}.stat-strip b{color:var(--text);font-weight:600}
  #panel{position:fixed;top:54px;right:0;bottom:0;width:340px;background:var(--panel);border-left:1px solid var(--border);z-index:9;display:flex;flex-direction:column;transition:transform .2s}
  #panel.hidden{transform:translateX(340px)}
  .ph{padding:14px 18px 11px;border-bottom:1px solid var(--border)}
  .ph .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .ph h2{margin:6px 0 0;font-size:16px;font-weight:600;font-family:var(--mono);word-break:break-all}
  .pb{flex:1;overflow-y:auto;padding:14px 18px}.pb::-webkit-scrollbar{width:8px}.pb::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
  .note{color:var(--muted);font-size:13px;line-height:1.65}.note .k{font-family:var(--mono);background:var(--panel-2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;color:var(--text)}
  .field{margin:12px 0}.field label{display:block;font-size:11px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
  .field input,.field select{width:100%;height:34px;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:13px;padding:0 10px;outline:none}
  .stepper{display:flex;align-items:center;gap:8px}.stepper button{width:34px;height:34px;border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:8px;font-size:18px;cursor:pointer}.stepper .v{flex:1;text-align:center;font-family:var(--mono);font-size:15px}
  .two{display:flex;gap:8px}.two>div{flex:1}
  .btn{width:100%;height:38px;border:0;border-radius:8px;background:var(--accent);color:#1a1206;font-weight:600;font-size:13px;cursor:pointer;margin-top:10px}
  .btn.ghost{background:var(--panel-2);color:var(--text);border:1px solid var(--border)}.btn.danger{background:var(--panel-2);color:var(--alert);border:1px solid rgba(255,93,93,.4)}.btn:active{transform:translateY(1px)}
  .grid2{display:flex;gap:8px}.grid2 .btn{margin-top:8px}
  .row{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid #20262f;font-size:13px}.row .lbl{color:var(--muted)}.row .val{font-family:var(--mono)}
  .line{display:flex;gap:8px;align-items:center;border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:7px;background:var(--panel-2)}
  .line .li{flex:1;min-width:0}.line .li .s{font-family:var(--mono);font-size:11px;color:var(--accent);word-break:break-all}.line .li .n{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .line .sz{width:52px}.line .qy{width:46px}
  .line .sz input,.line .qy input{width:100%;height:30px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;text-align:center;outline:none}
  .line .rm{width:26px;height:30px;border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:16px}
  .catlist{border:1px solid var(--border);border-radius:8px;margin-top:6px;max-height:230px;overflow-y:auto;background:var(--panel-2)}
  .catrow{padding:8px 10px;border-bottom:1px solid #20262f;cursor:pointer}.catrow:hover{background:#222a36}
  .catrow .s{font-family:var(--mono);font-size:11px;color:var(--accent);word-break:break-all}.catrow .n{font-size:12px;color:var(--text)}.catrow .x{font-size:11px;color:var(--muted);font-family:var(--mono)}
  .result{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:7px;cursor:pointer;background:var(--panel-2)}
  .result:hover{border-color:var(--accent)}.result .bx{font-family:var(--mono);font-size:11px;color:var(--accent);min-width:64px}.result .rd{font-size:12px;flex:1}.result .rd .q{color:var(--muted);font-family:var(--mono);font-size:11px}
  #hint{position:fixed;left:14px;bottom:12px;font-family:var(--mono);font-size:11px;color:var(--faint);z-index:8;line-height:1.7;max-width:58vw}#hint b{color:var(--muted)}
  #toggle-panel{position:fixed;top:62px;right:12px;z-index:11;width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--panel);color:var(--muted);cursor:pointer;display:none}
  #qrwrap{display:flex;justify-content:center;padding:16px;background:#fff;border-radius:10px;margin:10px 0}
  #scanOverlay{position:fixed;inset:0;background:rgba(8,10,14,.96);z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;padding:18px}
  #scanOverlay #reader{width:min(92vw,420px);border-radius:12px;overflow:hidden}
  #scanOverlay .sc-msg{color:var(--text);font-family:var(--mono);font-size:13px;margin:14px 0;text-align:center}#scanOverlay .tbtn{height:42px;padding:0 22px}
  @media(max-width:900px){.stat-strip,.brand{display:none}#panel{width:92vw}#panel.hidden{transform:translateX(92vw)}#toggle-panel{display:block}}
  #printArea{display:none}
  .lbl-box{font-family:Arial,Helvetica,sans-serif;color:#000}
  .lbl-id{font-size:30pt;font-weight:800;text-align:center;letter-spacing:1px}
  .lbl-qr{display:flex;justify-content:center;margin:6pt 0}
  .lbl-loc{text-align:center;font-size:11pt;margin-bottom:8pt}
  .lbl-tbl{width:100%;border-collapse:collapse;font-size:9pt}
  .lbl-tbl th,.lbl-tbl td{border-bottom:1px solid #000;padding:2pt 4pt;text-align:left}
  @media print{ body *{visibility:hidden!important} #printArea,#printArea *{visibility:visible!important} #printArea{display:block!important;position:fixed;left:0;top:0;width:3.7in} @page{size:4in 6in;margin:0.15in} }
</style>
</head>

function normalize(s){ s=s&&typeof s==='object'?s:{};
  s.dims=(s.dims&&typeof s.dims==='object')?s.dims:{}; s.dims.w=+s.dims.w||25; s.dims.l=+s.dims.l||100;
  s.sections=Array.isArray(s.sections)?s.sections:[]; s.zones=Array.isArray(s.zones)?s.zones:[];
  s.boxes=Array.isArray(s.boxes)?s.boxes:[]; s.seq=+s.seq||1; return s; }
let WH=[];
function computeWH(){const g=7,w=state.dims.w;WH=[{id:'A',name:'Warehouse A',cx:-(w/2+g/2)},{id:'B',name:'Warehouse B',cx:(w/2+g/2)}];}
function whOf(x){return x<0?WH[0]:WH[1];}
function clampWH(x,z){const w=whOf(x),hw=state.dims.w/2,hl=state.dims.l/2,m=1.2;return{x:Math.max(w.cx-hw+m,Math.min(w.cx+hw-m,x)),z:Math.max(-hl+m,Math.min(hl-m,z)),wh:w.id};}
function snap(v){return Math.round(v*2)/2;}
function newSection(whId){const w=WH.find(w=>w.id===whId);return{id:'S'+(state.seq++),name:'Sec '+(state.sections.filter(s=>s.wh===whId).length+1),wh:whId,x:w.cx-BW*2,z:-4,bays:4,levels:4,rot:0};}
function newZone(whId){const w=WH.find(w=>w.id===whId);return{id:'Z'+(state.seq++),name:'Office',wh:whId,x:w.cx-5,z:-6,w:10,d:8,rot:0};}
function newFreeBox(whId){const w=WH.find(w=>w.id===whId);return{id:'BX-'+String(state.seq++).padStart(4,'0'),free:true,wh:whId,x:w.cx,z:0,level:0,rot:0,items:[]};}

function boxesIn(sid,bay){return state.boxes.filter(b=>!b.free&&b.section===sid&&b.bay===bay).sort((a,b)=>a.level-b.level);}

function rebuild(){

    base.position.set(w/2,0.07,d/2);base.userData.section=s;g.add(base);

    group.add(g);secObjs.push({group:g,base,section:s});

const target=new THREE.Vector3(0,3,0);let radius=80,theta=-Math.PI/3.2,phi=0.62;
function applyCam(){phi=Math.max(.06,Math.min(Math.PI/2.05,phi));radius=Math.max(7,Math.min(360,radius));
  camera.position.set(target.x+radius*Math.sin(phi)*Math.cos(theta),target.y+radius*Math.cos(phi),target.z+radius*Math.sin(phi)*Math.sin(theta));camera.lookAt(target);}
function fitView(){target.set(0,3,0);radius=Math.max(46,state.dims.l*0.82);theta=-Math.PI/3.2;phi=0.62;applyCam();}
const el=renderer.domElement,ray=new THREE.Raycaster(),mouse=new THREE.Vector2(),gp=new THREE.Plane(new THREE.Vector3(0,1,0),0);
function pickAt(cx,cy){mouse.x=(cx/innerWidth)*2-1;mouse.y=-(cy/innerHeight)*2+1;ray.setFromCamera(mouse,camera);
  let h=ray.intersectObjects(boxMeshes.map(m=>m.mesh));if(h[0])return{type:'box',o:h[0].object.userData.box};
  h=ray.intersectObjects(secObjs.map(s=>s.base));if(h[0])return{type:'section',o:h[0].object.userData.section};
  h=ray.intersectObjects(zoneObjs.map(z=>z.slab));if(h[0])return{type:'zone',o:h[0].object.userData.zone};return null;}
function groundAt(cx,cy){mouse.x=(cx/innerWidth)*2-1;mouse.y=-(cy/innerHeight)*2+1;ray.setFromCamera(mouse,camera);const p=new THREE.Vector3();ray.ray.intersectPlane(gp,p);return p;}

let down=false,dmode=null,dobj=null,moved=false,lastX=0,lastY=0,downX=0,downY=0,dragStart=null;

    if(hit){dmode='move';dobj=hit;select(hit);
      if(hit.type==='box'){const m=boxMeshes.find(x=>x.box===hit.o);if(m)m.mesh.visible=false;ghost.visible=true;ghost.position.copy(m?m.mesh.getWorldPosition(new THREE.Vector3()):new THREE.Vector3());}
      else dragStart={g:groundAt(e.clientX,e.clientY),ox:hit.o.x,oz:hit.o.z};

  else if(dmode==='move'&&dobj&&moved){const p=groundAt(e.clientX,e.clientY);
    if(dobj.type==='box'){const c=clampWH(snap(p.x),snap(p.z));ghost.position.set(c.x,boxY(dobj.o.level),c.z);}
    else{const ndx=p.x-dragStart.g.x,ndz=p.z-dragStart.g.z;const c=clampWH(snap(dragStart.ox+ndx),snap(dragStart.oz+ndz));dobj.o.x=c.x;dobj.o.z=c.z;
      const ref=(dobj.type==='section'?secObjs.find(s=>s.section===dobj.o):zoneObjs.find(z=>z.zone===dobj.o));if(ref)ref.group.position.set(c.x,0,c.z);}}});
function endDrag(){
  if(dmode==='move'&&dobj){
    if(dobj.type==='box'){const b=dobj.o,m=boxMeshes.find(x=>x.box===b);if(m)m.mesh.visible=true;ghost.visible=false;
      if(moved){const p=ghost.position;
        // dropped onto a rack footprint?
        let onRack=null,obay=0;for(const s of state.sections){const th=s.rot||0,c=Math.cos(th),sn=Math.sin(th),dx=p.x-s.x,dz=p.z-s.z,lx=dx*c-dz*sn,lz=dx*sn+dz*c,w=s.bays*BW;if(lx>=-0.6&&lx<=w+0.6&&lz>=-0.8&&lz<=BD+0.8){onRack=s;obay=Math.max(0,Math.min(s.bays-1,Math.floor(lx/BW)));break;}}
        if(onRack){let bay=obay;
          b.free=false;delete b.x;delete b.z;b.section=onRack.id;b.bay=bay;b.level=Math.min(onRack.levels-1,boxesIn(onRack.id,bay).filter(x=>x!==b).length);}
        else{const c=clampWH(snap(p.x),snap(p.z));b.free=true;delete b.section;delete b.bay;b.wh=c.wh;b.x=c.x;b.z=c.z;if(b.level==null)b.level=0;}
        rebuild();select({type:'box',o:b});}
    } else { dobj.o.wh=whOf(dobj.o.x+(dobj.o.w?dobj.o.w/2:0)).id; rebuild(); }
  }
  if(!moved){const hit=pickAt(lastX,lastY);if(hit)select(hit);else if(MODE==='layout'){SELECTED=null;renderPanel();applyHighlights();}}
  down=false;dmode=null;dobj=null;dragStart=null;
}
el.addEventListener('pointerup',endDrag);el.addEventListener('pointercancel',endDrag);
el.addEventListener('wheel',e=>{e.preventDefault();radius+=e.deltaY*0.04;applyCam();},{passive:false});
el.addEventListener('contextmenu',e=>e.preventDefault());

/* ===== selection / highlight ===== */
let SELECTED=null,searchHits=new Set();
function select(hit){SELECTED=hit;renderPanel();applyHighlights();}
function applyHighlights(){
  for(const{mesh,box}of boxMeshes){let col=boxUnits(box)>0?0x6678c4:0x47536a,em=0,ei=0;
    if(searchHits.has(box.id)){col=0xffb020;em=0x4a3300;ei=.55;}
    if(SELECTED&&SELECTED.type==='box'&&SELECTED.o===box){col=0x5aa9ff;em=0x123a66;ei=.5;}
    mesh.material.color.setHex(col);mesh.material.emissive.setHex(em);mesh.material.emissiveIntensity=ei;}
  for(const{base,section}of secObjs)base.material.color.setHex(SELECTED&&SELECTED.type==='section'&&SELECTED.o===section?0x2d4a6b:0x2c3744);
  for(const{slab,zone}of zoneObjs)slab.material.opacity=(SELECTED&&SELECTED.type==='zone'&&SELECTED.o===zone)?0.55:0.34;
}

/* ===== scanner ===== */
let scanner=null;
function openScanner(onCode){const ov=document.getElementById('scanOverlay'),msg=document.getElementById('scmsg');
  if(typeof Html5Qrcode==='undefined'){alert('Scanner library is offline. Connect to the internet and reopen.');return;}
  ov.style.display='flex';msg.textContent='Point the camera at a barcode…';
  let cfg={verbose:false};
  if(typeof Html5QrcodeSupportedFormats!=='undefined'){const F=Html5QrcodeSupportedFormats;cfg.formatsToSupport=[F.QR_CODE,F.UPC_A,F.UPC_E,F.EAN_13,F.EAN_8,F.CODE_128,F.CODE_39,F.ITF];}
  scanner=new Html5Qrcode('reader',cfg);
  scanner.start({facingMode:'environment'},{fps:12,qrbox:{width:300,height:200},aspectRatio:1.3333},txt=>{closeScanner();onCode(String(txt).trim());},()=>{}).catch(err=>{msg.textContent='Camera unavailable: '+err;});}
function closeScanner(){const ov=document.getElementById('scanOverlay');if(scanner){scanner.stop().then(()=>{scanner.clear();scanner=null;}).catch(()=>{scanner=null;});}ov.style.display='none';}
document.getElementById('scanClose').onclick=closeScanner;

/* ===== find ===== */
function runFind(t){searchHits=new Set();if(t){const tl=t.toLowerCase();for(const b of state.boxes){if((b.items||[]).some(i=>{const c=BYSKU[i.sku];return i.sku.toLowerCase().includes(tl)||(c&&(c.name.toLowerCase().includes(tl)||c.color.toLowerCase().includes(tl)));}))searchHits.add(b.id);}}applyHighlights();if(MODE==='find')panelFind(t);}
function panelFind(t){eye.textContent='Find';title.textContent=t?`${searchHits.size} box(es)`:'Find a SKU';
  if(!t){body.innerHTML=`<div class="note">Type a SKU, name, or color. Every box that holds it lights up <span style="color:var(--accent)">amber</span>; the list appears here.</div>`;return;}
  const rows=[];for(const b of state.boxes){if(!searchHits.has(b.id))continue;const s=b.free?null:state.sections.find(x=>x.id===b.section);(b.items||[]).filter(i=>{const c=BYSKU[i.sku];const tl=t.toLowerCase();return i.sku.toLowerCase().includes(tl)||(c&&(c.name.toLowerCase().includes(tl)||c.color.toLowerCase().includes(tl)));}).forEach(i=>rows.push({b,s,i}));}
  body.innerHTML=rows.length?rows.map(r=>`<div class="result" data-id="${r.b.id}"><div class="bx">${r.b.id}</div><div class="rd"><div>${r.i.sku}${r.i.size?' · sz '+r.i.size:''}</div><div class="q">${r.b.free?'free':(r.s?r.s.name+' · bay '+(r.b.bay+1):'')} · qty ${r.i.qty}</div></div></div>`).join(''):`<div class="note" style="margin-top:20px">Not in any box yet.</div>`;
  body.querySelectorAll('.result').forEach(n=>n.onclick=()=>{const b=state.boxes.find(x=>x.id===n.dataset.id);
    if(b.free){target.set(b.x,(b.level||0)*LH+2,b.z);}else{const s=state.sections.find(x=>x.id===b.section);if(s)target.set(s.x+s.bays*BW/2,b.level*LH+2,s.z);}radius=16;applyCam();select({type:'box',o:b});});}

/* ===== warehouse settings ===== */
document.getElementById('whset').onclick=()=>{MODE='layout';document.querySelectorAll('.modes button').forEach(x=>x.classList.toggle('on',x.dataset.mode==='layout'));
  eye.textContent='Settings';title.textContent='Warehouse size';
  body.innerHTML=`<div class="note">Each warehouse is drawn to scale in feet. Default is your 25 × 100.</div>
  <div class="field"><label>Width (ft, across)</label><div class="stepper"><button id="w-">–</button><span class="v" id="wv">${state.dims.w}</span><button id="w+">+</button></div></div>
  <div class="field"><label>Length (ft, deep)</label><div class="stepper"><button id="l-">–</button><span class="v" id="lv2">${state.dims.l}</span><button id="l+">+</button></div></div>
  <button class="btn ghost" id="frame">Re-center camera</button>`;
  const sw=v=>{state.dims.w=Math.max(8,Math.min(160,v));wv.textContent=state.dims.w;computeWH();buildPads();rebuild();};const sl=v=>{state.dims.l=Math.max(8,Math.min(500,v));lv2.textContent=state.dims.l;computeWH();buildPads();rebuild();};
  document.getElementById('w-').onclick=()=>sw(state.dims.w-1);document.getElementById('w+').onclick=()=>sw(state.dims.w+1);document.getElementById('l-').onclick=()=>sl(state.dims.l-5);document.getElementById('l+').onclick=()=>sl(state.dims.l+5);
  document.getElementById('frame').onclick=fitView;};

/* ===== stats / persistence ===== */
function updateStats(){const u=state.boxes.reduce((t,b)=>t+boxUnits(b),0);document.getElementById('s-box').textContent=state.boxes.length;document.getElementById('s-units').textContent=u.toLocaleString();}
function autosave(){try{if(window.storage&&window.storage.set)window.storage.set(SKEY,JSON.stringify(state));}catch(e){}schedulePush();}
async function autoload(){try{if(window.storage&&window.storage.get){const r=await window.storage.get(SKEY);if(r&&r.value)state=normalize(JSON.parse(r.value));}}catch(e){}}
document.getElementById('save').onclick=()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='naghedi-layout.json';a.click();URL.revokeObjectURL(a.href);};
document.getElementById('load').onclick=()=>document.getElementById('file').click();
document.getElementById('file').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=normalize(JSON.parse(r.result));SELECTED=null;computeWH();buildPads();fitView();rebuild();renderPanel();}catch(err){alert('Could not read that file.');}};r.readAsText(f);};

/* ===== cloud sync (Airtable via relay worker) ===== */
function toast(m){const h=document.getElementById('hint');h.innerHTML='<b style="color:var(--verified)">'+m+'</b>';setTimeout(setHint,1800);}
async function cloudPull(){ if(!SYNCURL){alert('Enter your Sync URL first.');return;}
  try{const r=await fetch(SYNCURL,{headers:{'x-secret':SYNCSEC}});if(!r.ok)throw new Error('HTTP '+r.status);const j=await r.json();
    const st=j&&j.state?j.state:(j&&j.dims?j:null); if(!st){toast('Cloud is empty — push first');return;}
    state=normalize(st);SELECTED=null;computeWH();buildPads();fitView();rebuild();renderPanel();toast('Pulled from cloud');}
  catch(e){alert('Pull failed: '+e.message);} }
async function cloudPush(){ if(!SYNCURL)return false;
  try{const r=await fetch(SYNCURL,{method:'PUT',headers:{'content-type':'application/json','x-secret':SYNCSEC},body:JSON.stringify({state})});if(!r.ok)throw new Error('HTTP '+r.status);return true;}
  catch(e){console.warn('cloud push failed',e);return false;} }
function schedulePush(){ if(!AUTOPUSH||!SYNCURL)return; clearTimeout(pushT); pushT=setTimeout(cloudPush,1500); }
function showCloud(){MODE='layout';document.querySelectorAll('.modes button').forEach(x=>x.classList.toggle('on',x.dataset.mode==='layout'));
  eye.textContent='Cloud sync';title.textContent='Airtable online sync';
  body.innerHTML=`<div class="note">Syncs this layout to your Airtable base through a small relay worker (see the setup notes). Paste the Worker URL and the shared secret you set there. Your Airtable token stays in the worker, never in this page.</div>
  <div class="field"><label>Sync URL</label><input id="su" value="${SYNCURL}" placeholder="https://your-worker.workers.dev/layout"></div>
  <div class="field"><label>Shared secret</label><input id="ss" value="${SYNCSEC}" placeholder="the secret you configured"></div>
  <label style="display:flex;gap:8px;align-items:center;font-size:13px;color:var(--muted);margin:10px 0"><input type="checkbox" id="ap" ${AUTOPUSH?'checked':''}> Auto-push my changes</label>
  <button class="btn" id="pull">⬇ Pull from cloud</button>
  <button class="btn ghost" id="push">⬆ Push to cloud now</button>`;
  document.getElementById('su').onchange=e=>{SYNCURL=e.target.value.trim();LS.set('nwh_sync_url',SYNCURL);};
  document.getElementById('ss').onchange=e=>{SYNCSEC=e.target.value.trim();LS.set('nwh_sync_secret',SYNCSEC);};
  document.getElementById('ap').onchange=e=>{AUTOPUSH=e.target.checked;LS.set('nwh_autopush',AUTOPUSH?'1':'0');};
  document.getElementById('pull').onclick=cloudPull;
  document.getElementById('push').onclick=()=>cloudPush().then(ok=>toast(ok?'Pushed to cloud':'Push failed'));}
document.getElementById('cloud').onclick=showCloud;

/* ===== boot ===== */
(async function(){
  await autoload(); state=normalize(state); computeWH();
  if(!state.sections.length&&!state.boxes.length){
    const a=newSection('A');state.sections.push(a);
    state.boxes.push({id:'BX-'+String(state.seq++).padStart(4,'0'),section:a.id,bay:0,level:0,items:[]});
    state.boxes.push({id:'BX-'+String(state.seq++).padStart(4,'0'),section:a.id,bay:1,level:0,items:[]});
    state.boxes.push(Object.assign(newFreeBox('B'),{x:WH[1].cx,z:8}));
    state.boxes.push(Object.assign(newFreeBox('B'),{x:WH[1].cx+3,z:8}));
  }
  buildPads();fitView();rebuild();renderPanel();
  (function loop(){requestAnimationFrame(loop);renderer.render(scene,camera);})();
})();
</script>
</body>
</html>
